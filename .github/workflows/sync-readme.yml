name: Sync README

on:
  push:
    paths:
      - 'ClaudeCodeUI/README.md'
      - '.github/workflows/sync-readme.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy README to repo root
        run: cp ClaudeCodeUI/README.md README.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: sync root README from ClaudeCodeUI/README.md"
          git push
